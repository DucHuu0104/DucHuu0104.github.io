<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duc Huu | Portfolio</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">Duc Huu</a>
        <ul class="nav-links">
            <li><a href="#about">About Us</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="mobile-menu-btn">
            <i class="ph ph-list"></i>
        </div>
    </nav>

    <main>
        <!-- Home Section -->
        <section id="home" class="hero">
            <div class="glow-bg reveal"></div>
            
            <div class="hero-left reveal delay-1">
                <div class="intro">
                    <p class="greeting">Hello, I'm</p>
                    <h1 class="name">Duc Huu</h1>
                </div>
                
                <div class="social-links-vertical">
                    <a href="#" aria-label="LinkedIn"><i class="ph ph-linkedin-logo"></i></a>
                    <a href="#" aria-label="GitHub"><i class="ph ph-github-logo"></i></a>
                    <a href="#" aria-label="Dribbble"><i class="ph ph-dribbble-logo"></i></a>
                    <a href="#" aria-label="Mail"><i class="ph ph-envelope-simple"></i></a>
                </div>
            </div>

            <div class="hero-center reveal delay-2">
                <img src="custom_avatar_neon_v2.png" alt="Developer Avatar" class="main-avatar" id="avatar-img">
            </div>

            <div class="hero-right reveal delay-1">
                <h2 class="role">
                    <span class="role-small">Creative</span>
                    <span class="role-outline">Developer</span>
                    <span class="role-solid">Designer</span>
                </h2>
                
                <a href="#resume" class="resume-btn">RESUME <i class="ph ph-file-text"></i></a>
            </div>
            
            <!-- Bottom Right Subscribe (as in reference) -->
            <div class="subscribe-text">
                sub<br/>scribe
            </div>
        </section>

        <!-- Other sections hidden or simplified for now, focusing on the requested Hero UI -->
    </main>

    <script src="script.js"></script>
</body>
</html>
